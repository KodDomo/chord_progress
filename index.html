<!DOCTYPE html>
<html lang="sv">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Interaktivt verktyg för ackordsföljd</title>
    <style>
        :root {
            --bg-color: #121212;
            --card-bg: #1e1e1e;
            --accent-color: #3498db;
            --sec-color: #e67e22;
            --modal-color: #9b59b6;
            --text-color: #f0f0f0;
            --highlight-bg: #ffffff;
            --highlight-text: #000000;
        }

        body {
            font-family: 'Inter', system-ui, -apple-system, sans-serif;
            background-color: var(--bg-color);
            color: var(--text-color);
            display: flex;
            flex-direction: column;
            align-items: center;
            padding: 40px 20px;
            margin: 0;
        }

        .container {
            max-width: 1000px;
            width: 100%;
            background: var(--card-bg);
            padding: 40px;
            border-radius: 20px;
            box-shadow: 0 20px 50px rgba(0,0,0,0.6);
        }

        header {
            text-align: center;
            margin-bottom: 40px;
        }

        h1 { margin-bottom: 10px; font-weight: 800; }

        select {
            padding: 12px 25px;
            font-size: 1.1rem;
            border-radius: 10px;
            background: #2c2c2c;
            color: white;
            border: 2px solid var(--accent-color);
            cursor: pointer;
            outline: none;
        }

        .row-container {
            display: flex;
            flex-direction: column;
            gap: 20px;
        }

        .row {
            display: grid;
            grid-template-columns: repeat(6, 1fr);
            gap: 12px;
            text-align: center;
        }

        .row-label {
            font-size: 0.8rem;
            text-transform: uppercase;
            letter-spacing: 2px;
            color: #777;
            margin-bottom: 10px;
            grid-column: 1 / -1;
        }

        .chord-card {
            background: #2a2a2a;
            padding: 20px 10px;
            border-radius: 12px;
            font-weight: 700;
            font-size: 1.2rem;
            border: 1px solid #333;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            min-height: 80px;
        }

        .arrow {
            font-size: 1rem;
            opacity: 0.5;
            margin: 5px 0;
        }

        /* Styling per row */
        .top-row .chord-card { border-top: 4px solid var(--sec-color); }
        .mid-row .chord-card { border-top: 4px solid var(--accent-color); }
        .bot-row .chord-card { border-top: 4px solid var(--modal-color); }

        .mid-row .highlight {
            background: var(--highlight-bg);
            color: var(--highlight-text);
        }

        .bot-row {
            grid-template-columns: repeat(4, 1fr);
            max-width: 660px;
            margin: 0 auto;
            width: 100%;
        }

        .spacer { height: 20px; }

        footer {
            margin-top: 50px;
            opacity: 0.4;
            font-size: 0.8rem;
            text-align: center;
            line-height: 1.6;
        }
    </style>
</head>
<body>

<div class="container">
    <header>
        <h1>Verktyg för ackord</h1>
        <select id="keySelect" onchange="render()">
            <option value="C">C Dur</option>
            <option value="G">G Dur</option>
            <option value="D">D Dur</option>
            <option value="A">A Dur</option>
            <option value="E">E Dur</option>
            <option value="B">B Dur</option>
            <option value="F#">F# Dur</option>
            <option value="F">F Dur</option>
            <option value="Bb">Bb Dur</option>
            <option value="Eb">Eb Dur</option>
            <option value="Ab">Ab Dur</option>
            <option value="Db">Db Dur</option>
        </select>
    </header>

    <div class="row-container">
        <div class="row-label">Dominanter (Leder nedåt)</div>
        <div class="row top-row" id="topRow"></div>

        <div class="spacer"></div>

        <div class="row-label">Grundackord (Mitten)</div>
        <div class="row mid-row" id="midRow"></div>

        <div class="spacer"></div>

        <div class="row-label">Modal Interchange (Lånade från parallellmoll)</div>
        <div class="row bot-row" id="botRow"></div>
    </div>

    <footer>
        Vita rutor markerar Tonika (I), Subdominant (IV) och Dominant (V).
    </footer>
</div>

<script>
    const data = {
        "C": { top: ["G7","A7","B7","C7","D7","E7"], mid: ["C","Dm","Em","F","G","Am"], bot: ["Eb","Fm","Ab","Bb"] },
        "G": { top: ["D7","E7","F#7","G7","A7","B7"], mid: ["G","Am","Bm","C","D","Em"], bot: ["Bb","Cm","Eb","F"] },
        "D": { top: ["A7","B7","C#7","D7","E7","F#7"], mid: ["D","Em","F#m","G","A","Bm"], bot: ["F","Gm","Bb","C"] },
        "A": { top: ["E7","F#7","G#7","A7","B7","C#7"], mid: ["A","Bm","C#m","D","E","F#m"], bot: ["C","Dm","F","G"] },
        "E": { top: ["B7","C#7","D#7","E7","F#7","G#7"], mid: ["E","F#m","G#m","A","B","C#m"], bot: ["G","Am","C","D"] },
        "B": { top: ["F#7","G#7","A#7","B7","C#7","D#7"], mid: ["B","C#m","D#m","E","F#","G#m"], bot: ["D","Em","G","A"] },
        "F#": { top: ["C#7","D#7","F7","F#7","G#7","A#7"], mid: ["F#","G#m","A#m","B","C#","D#m"], bot: ["A","Bm","D","E"] },
        "F": { top: ["C7","D7","E7","F7","G7","A7"], mid: ["F","Gm","Am","Bb","C","Dm"], bot: ["Ab","Bbm","Db","Eb"] },
        "Bb": { top: ["F7","G7","A7","Bb7","C7","D7"], mid: ["Bb","Cm","Dm","Eb","F","Gm"], bot: ["Db","Ebm","Gb","Ab"] },
        "Eb": { top: ["Bb7","C7","D7","Eb7","F7","G7"], mid: ["Eb","Fm","Gm","Ab","Bb","Cm"], bot: ["Gb","Abm","B","Db"] },
        "Ab": { top: ["Eb7","F7","G7","Ab7","Bb7","C7"], mid: ["Ab","Bbm","Cm","Db","Eb","Fm"], bot: ["B","Dbm","E","Gb"] },
        "Db": { top: ["Ab7","Bb7","C7","Db7","Eb7","F7"], mid: ["Db","Ebm","Fm","Gb","Ab","Bbm"], bot: ["E","Gbm","A","B"] }
    };

    function render() {
        const key = document.getElementById('keySelect').value;
        const current = data[key];

        const t = document.getElementById('topRow');
        const m = document.getElementById('midRow');
        const b = document.getElementById('botRow');

        t.innerHTML = current.top.map(c => `<div class="chord-card"><span>${c}</span><span class="arrow">↓</span></div>`).join('');
        m.innerHTML = current.mid.map((c, i) => `<div class="chord-card ${[0,3,4].includes(i) ? 'highlight' : ''}">${c}</div>`).join('');
        b.innerHTML = current.bot.map(c => `<div class="chord-card"><span class="arrow">↑</span><span>${c}</span></div>`).join('');
    }

    render();
</script>
</body>
</html>
